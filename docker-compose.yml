version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-emlakportal123}
      POSTGRES_DB: konya_emlak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-emlakportal123}@db:5432/konya_emlak?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret-in-production}
      SCRAPER_ENABLED: "true"
      SCRAPER_DELAY_MIN: "2000"
      SCRAPER_DELAY_MAX: "5000"
    depends_on:
      - db

volumes:
  pgdata:
